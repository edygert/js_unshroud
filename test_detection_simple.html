<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CDP Detection Test - Console Output</title>
</head>
<body>
    <h1>CDP Detection Test</h1>
    <p>Check console and JSONL output for results...</p>

    <script>
        // Test 1: Error.prepareStackTrace CDP Detection (Main Context)
        console.log('=== TEST 1: Main Context CDP Detection ===');
        try {
            let wasAccessed = false;
            const originalPrepareStackTrace = Error.prepareStackTrace;
            Error.prepareStackTrace = function() {
                wasAccessed = true;
                console.log('[DETECTION] Error.prepareStackTrace was invoked!');
                return originalPrepareStackTrace;
            };
            const err = new Error('test');
            console.log(err);
            console.log('[RESULT] CDP Main Context:', wasAccessed);
            console.log(wasAccessed ? '[FAIL] CDP DETECTED in main context' : '[PASS] CDP NOT detected in main context');
        } catch(e) {
            console.log('[ERROR] Test 1 failed:', e.message);
        }

        // Test 2: Playwright Globals
        console.log('=== TEST 2: Playwright Globals ===');
        const playwrightDetected = ('__pwInitScripts' in window) || ('__playwright__binding__' in window);
        console.log('[RESULT] __pwInitScripts in window:', '__pwInitScripts' in window);
        console.log('[RESULT] __playwright__binding__ in window:', '__playwright__binding__' in window);
        console.log(playwrightDetected ? '[FAIL] Playwright globals DETECTED' : '[PASS] Playwright globals NOT detected');

        // Test 3: Playwright Functions
        console.log('=== TEST 3: Playwright Exposed Functions ===');
        console.log('[RESULT] typeof __playwright_log_event:', typeof window.__playwright_log_event);
        console.log('[RESULT] typeof __playwright_save_artifact:', typeof window.__playwright_save_artifact);
        console.log('[RESULT] typeof __js_unshroud_log:', typeof window.__js_unshroud_log);
        const functionsExposed = (typeof window.__playwright_log_event !== 'undefined') ||
                                 (typeof window.__playwright_save_artifact !== 'undefined');
        console.log(functionsExposed ? '[FAIL] Playwright functions EXPOSED' : '[PASS] Playwright functions HIDDEN');

        // Test 4: Worker CDP Detection
        console.log('=== TEST 4: Worker CDP Detection ===');
        try {
            const workerCode = `
                try {
                    let wasAccessed = false;
                    const originalPrepareStackTrace = Error.prepareStackTrace;
                    Error.prepareStackTrace = function() {
                        wasAccessed = true;
                        return originalPrepareStackTrace;
                    };
                    const err = new Error('test');
                    console.log(err);
                    self.postMessage({ cdpDetected: wasAccessed });
                } catch(e) {
                    self.postMessage({ cdpDetected: 'ERROR: ' + e.message });
                }
            `;

            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(blob));

            worker.onmessage = (e) => {
                console.log('[RESULT] CDP Worker Context:', e.data.cdpDetected);
                console.log(e.data.cdpDetected === true ? '[FAIL] CDP DETECTED in worker' : '[PASS] CDP NOT detected in worker');
            };

            worker.onerror = (e) => {
                console.log('[ERROR] Worker test failed:', e.message);
            };
        } catch(e) {
            console.log('[ERROR] Test 4 failed:', e.message);
        }

        // Test 5: Worker Value Consistency
        console.log('=== TEST 5: Worker Value Consistency ===');
        try {
            const workerCode = `
                self.postMessage({
                    userAgent: navigator.userAgent,
                    hardwareConcurrency: navigator.hardwareConcurrency,
                    platform: navigator.platform
                });
            `;

            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(blob));

            worker.onmessage = (e) => {
                const mainHardware = navigator.hardwareConcurrency;
                const workerHardware = e.data.hardwareConcurrency;
                const consistent = mainHardware === workerHardware;

                console.log('[RESULT] Main hardwareConcurrency:', mainHardware);
                console.log('[RESULT] Worker hardwareConcurrency:', workerHardware);
                console.log('[RESULT] Values consistent:', consistent);
                console.log(consistent ? '[PASS] Worker values CONSISTENT' : '[FAIL] Worker values INCONSISTENT');
            };
        } catch(e) {
            console.log('[ERROR] Test 5 failed:', e.message);
        }
    </script>
</body>
</html>
