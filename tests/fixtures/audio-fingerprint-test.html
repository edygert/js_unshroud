<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio Fingerprint Test</title>
</head>
<body>
  <h1>Audio Fingerprinting Test</h1>
  <div id="results"></div>

  <script>
    // Audio fingerprinting technique using OfflineAudioContext
    async function testAudioFingerprint() {
      const results = [];

      try {
        // Test 1: AudioContext sampleRate
        const audioCtx = new AudioContext();
        results.push(`AudioContext sampleRate: ${audioCtx.sampleRate}`);

        // Test 2: OfflineAudioContext fingerprinting (common technique)
        const ctx = new OfflineAudioContext(1, 44100, 44100);

        // Create oscillator
        const oscillator = ctx.createOscillator();
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(10000, ctx.currentTime);

        // Create analyser
        const analyser = ctx.createAnalyser();
        oscillator.connect(analyser);
        analyser.connect(ctx.destination);
        oscillator.start(0);

        // Render audio
        const audioBuffer = await ctx.startRendering();
        const data = audioBuffer.getChannelData(0);

        // Calculate fingerprint hash (sum of first 100 samples)
        const hash = Array.from(data.slice(0, 100)).reduce((a, b) => a + b, 0);
        results.push(`Audio fingerprint hash: ${hash.toFixed(10)}`);
        results.push(`Buffer length: ${audioBuffer.length} samples`);
        results.push(`Number of channels: ${audioBuffer.numberOfChannels}`);

        // Display results
        document.getElementById('results').innerHTML = '<pre>' + results.join('\n') + '</pre>';

        console.log('Audio fingerprinting test completed');
        console.log('Hash:', hash);
      } catch (e) {
        results.push(`Error: ${e.message}`);
        document.getElementById('results').innerHTML = '<pre>' + results.join('\n') + '</pre>';
      }
    }

    testAudioFingerprint();
  </script>
</body>
</html>
