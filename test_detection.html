<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CDP Detection Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        #results { margin-top: 20px; }
        .result { margin: 10px 0; padding: 10px; background: #f0f0f0; }
        .pass { background: #d4edda; }
        .fail { background: #f8d7da; }
        pre { background: #fff; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>CDP Detection Test</h1>
    <p>Testing Error.prepareStackTrace CDP detection mechanism...</p>
    <div id="results"></div>

    <script>
        // Test 1: Main Context CDP Detection (prepareStackTrace)
        function testMainContextCDP() {
            try {
                let wasAccessed = false;
                const originalPrepareStackTrace = Error.prepareStackTrace;
                Error.prepareStackTrace = function() {
                    wasAccessed = true;
                    return originalPrepareStackTrace;
                };
                const err = new Error('');
                console.log(err);
                return wasAccessed;
            } catch(e) {
                return 'ERROR: ' + e.message;
            }
        }

        // Test 2: Playwright Detection
        function testPlaywright() {
            return {
                __pwInitScripts: '__pwInitScripts' in window,
                __playwright__binding__: '__playwright__binding__' in window,
                detected: '__pwInitScripts' in window || '__playwright__binding__' in window
            };
        }

        // Test 3: Playwright Exposed Functions
        function testPlaywrightFunctions() {
            return {
                __playwright_log_event: typeof window.__playwright_log_event,
                __playwright_save_artifact: typeof window.__playwright_save_artifact,
                __js_unshroud_log: typeof window.__js_unshroud_log
            };
        }

        // Test 4: Worker CDP Detection
        function testWorkerCDP() {
            return new Promise((resolve) => {
                try {
                    const workerCode = `
                        try {
                            let wasAccessed = false;
                            const originalPrepareStackTrace = Error.prepareStackTrace;
                            Error.prepareStackTrace = function() {
                                wasAccessed = true;
                                return originalPrepareStackTrace;
                            };
                            const err = new Error('');
                            console.log(err);
                            self.postMessage({ cdpDetected: wasAccessed });
                        } catch(e) {
                            self.postMessage({ cdpDetected: 'ERROR: ' + e.message });
                        }
                    `;

                    const blob = new Blob([workerCode], { type: 'application/javascript' });
                    const worker = new Worker(URL.createObjectURL(blob));

                    worker.onmessage = (e) => {
                        resolve(e.data.cdpDetected);
                    };

                    worker.onerror = (e) => {
                        resolve('ERROR: ' + e.message);
                    };

                    setTimeout(() => resolve('TIMEOUT'), 2000);
                } catch(e) {
                    resolve('ERROR: ' + e.message);
                }
            });
        }

        // Test 5: Worker Value Consistency
        function testWorkerConsistency() {
            return new Promise((resolve) => {
                try {
                    const workerCode = `
                        self.postMessage({
                            userAgent: navigator.userAgent,
                            hardwareConcurrency: navigator.hardwareConcurrency,
                            platform: navigator.platform,
                            languages: JSON.stringify(navigator.languages)
                        });
                    `;

                    const blob = new Blob([workerCode], { type: 'application/javascript' });
                    const worker = new Worker(URL.createObjectURL(blob));

                    worker.onmessage = (e) => {
                        const mainValues = {
                            userAgent: navigator.userAgent,
                            hardwareConcurrency: navigator.hardwareConcurrency,
                            platform: navigator.platform,
                            languages: JSON.stringify(navigator.languages)
                        };

                        const consistent =
                            mainValues.userAgent === e.data.userAgent &&
                            mainValues.hardwareConcurrency === e.data.hardwareConcurrency &&
                            mainValues.platform === e.data.platform &&
                            mainValues.languages === e.data.languages;

                        resolve({
                            main: mainValues,
                            worker: e.data,
                            consistent: consistent
                        });
                    };

                    setTimeout(() => resolve({ error: 'TIMEOUT' }), 2000);
                } catch(e) {
                    resolve({ error: e.message });
                }
            });
        }

        // Run tests and display results
        async function runTests() {
            const results = document.getElementById('results');

            // Test 1
            const cdpMain = testMainContextCDP();
            results.innerHTML += `
                <div class="result ${cdpMain === true ? 'fail' : 'pass'}">
                    <strong>Test 1: Main Context CDP (Error.prepareStackTrace)</strong><br>
                    Result: ${cdpMain}<br>
                    ${cdpMain === true ? '❌ DETECTED - CDP is active' : '✅ PASSED - CDP not detected'}
                </div>
            `;

            // Test 2
            const playwright = testPlaywright();
            results.innerHTML += `
                <div class="result ${playwright.detected ? 'fail' : 'pass'}">
                    <strong>Test 2: Playwright Global Detection</strong><br>
                    __pwInitScripts: ${playwright.__pwInitScripts}<br>
                    __playwright__binding__: ${playwright.__playwright__binding__}<br>
                    ${playwright.detected ? '❌ DETECTED - Playwright globals found' : '✅ PASSED - No Playwright globals'}
                </div>
            `;

            // Test 3
            const functions = testPlaywrightFunctions();
            results.innerHTML += `
                <div class="result ${functions.__playwright_log_event !== 'undefined' || functions.__playwright_save_artifact !== 'undefined' ? 'fail' : 'pass'}">
                    <strong>Test 3: Playwright Exposed Functions</strong><br>
                    __playwright_log_event: ${functions.__playwright_log_event}<br>
                    __playwright_save_artifact: ${functions.__playwright_save_artifact}<br>
                    __js_unshroud_log: ${functions.__js_unshroud_log}<br>
                    ${functions.__playwright_log_event !== 'undefined' || functions.__playwright_save_artifact !== 'undefined' ? '❌ DETECTED - Playwright functions exposed' : '✅ PASSED - Functions hidden'}
                </div>
            `;

            // Test 4
            results.innerHTML += '<div class="result">⏳ Test 4: Worker CDP Detection - Running...</div>';
            const cdpWorker = await testWorkerCDP();
            results.lastElementChild.className = `result ${cdpWorker === true ? 'fail' : 'pass'}`;
            results.lastElementChild.innerHTML = `
                <strong>Test 4: Worker CDP (Error.prepareStackTrace)</strong><br>
                Result: ${cdpWorker}<br>
                ${cdpWorker === true ? '❌ DETECTED - CDP active in worker' : '✅ PASSED - CDP not detected in worker'}
            `;

            // Test 5
            results.innerHTML += '<div class="result">⏳ Test 5: Worker Value Consistency - Running...</div>';
            const consistency = await testWorkerConsistency();
            results.lastElementChild.className = `result ${consistency.consistent === false ? 'fail' : 'pass'}`;
            results.lastElementChild.innerHTML = `
                <strong>Test 5: Worker Value Consistency</strong><br>
                Consistent: ${consistency.consistent}<br>
                ${consistency.consistent === false ? '❌ FAILED - Inconsistent values detected' : '✅ PASSED - Values consistent'}
                <pre>${JSON.stringify(consistency, null, 2)}</pre>
            `;

            // Summary
            const allTests = [
                cdpMain !== true,
                !playwright.detected,
                functions.__playwright_log_event === 'undefined' && functions.__playwright_save_artifact === 'undefined',
                cdpWorker !== true,
                consistency.consistent !== false
            ];
            const passed = allTests.filter(t => t).length;
            const total = allTests.length;

            results.innerHTML += `
                <div class="result ${passed === total ? 'pass' : 'fail'}">
                    <h2>Summary: ${passed}/${total} tests passed</h2>
                    ${passed === total ? '✅ All detections bypassed!' : '❌ Some detections still active'}
                </div>
            `;
        }

        // Run tests after page load
        setTimeout(runTests, 500);
    </script>
</body>
</html>
